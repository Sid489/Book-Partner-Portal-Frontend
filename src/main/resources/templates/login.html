<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Book Partner Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>


    <div class="container">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Login to your account to continue</p>

            <form>
                <div class="input-group">
                    <input type="text" placeholder="Username" required autocomplete="username">
                </div>

                <div class="input-group">
                    <input type="password" placeholder="Password" required autocomplete="current-password">
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>
        </div>
    </div>

</body>

</html>
